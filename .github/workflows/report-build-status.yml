name: Report Build Status

on:
  pull_request:
    branches: [develop]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: build-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  report-build-status:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'convex/**'
              - 'src/application/**'
              - 'src/domain/**'
              - 'src/infrastructure/convex/**'
              - 'src/infrastructure/storage/**'
              - 'src/infrastructure/*.ts'
              - 'src/ui/shared/**'
              - '.github/workflows/report-build-status.yml'
              - 'package.json'
              - 'tsconfig.json'
              - 'biome.json'
            web:
              - 'web/**'
              - 'public/**'
              - 'src/ui/web/**'
            mobile:
              - 'mobile/**'
              - 'src/ui/mobile/**'
              - 'src/infrastructure/mobile/**'

      - name: Compute platform matrix
        id: platforms
        run: |
          run_web=false
          run_mobile=false

          if [ "${{ steps.filter.outputs.shared }}" = "true" ] || [ "${{ steps.filter.outputs.web }}" = "true" ]; then
            run_web=true
          fi

          if [ "${{ steps.filter.outputs.shared }}" = "true" ] || [ "${{ steps.filter.outputs.mobile }}" = "true" ]; then
            run_mobile=true
          fi

          echo "run_web=${run_web}" >> "$GITHUB_OUTPUT"
          echo "run_mobile=${run_mobile}" >> "$GITHUB_OUTPUT"

      - name: Summarize execution plan
        run: |
          echo "## Report Build Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Shared changes detected: ${{ steps.filter.outputs.shared }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web changes detected: ${{ steps.filter.outputs.web }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mobile changes detected: ${{ steps.filter.outputs.mobile }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run web checks: ${{ steps.platforms.outputs.run_web }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run mobile checks: ${{ steps.platforms.outputs.run_mobile }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        if: ${{ steps.platforms.outputs.run_web == 'true' || steps.platforms.outputs.run_mobile == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.x

      - name: Setup Bun
        if: ${{ steps.platforms.outputs.run_web == 'true' || steps.platforms.outputs.run_mobile == 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install web dependencies
        if: ${{ steps.platforms.outputs.run_web == 'true' }}
        run: cd web && bun install --frozen-lockfile

      - name: Run web tests
        if: ${{ steps.platforms.outputs.run_web == 'true' }}
        run: bun run web:test

      - name: Run web build
        if: ${{ steps.platforms.outputs.run_web == 'true' }}
        run: bun run web:build

      - name: Install mobile dependencies
        if: ${{ steps.platforms.outputs.run_mobile == 'true' }}
        run: cd mobile && bun install --frozen-lockfile

      - name: Run mobile checks
        if: ${{ steps.platforms.outputs.run_mobile == 'true' }}
        run: bun run --cwd mobile test

      - name: Run mobile build check
        if: ${{ steps.platforms.outputs.run_mobile == 'true' }}
        run: bun run --cwd mobile build:check

      - name: No platform checks required
        if: ${{ steps.platforms.outputs.run_web != 'true' && steps.platforms.outputs.run_mobile != 'true' }}
        run: echo "No web or mobile checks were required for this change."
