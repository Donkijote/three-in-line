name: Report Build Status

on:
  pull_request:
    branches: [develop]
    types: [ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: build-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  detect-changes:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    outputs:
      run_web: ${{ steps.platforms.outputs.run_web }}
      run_mobile: ${{ steps.platforms.outputs.run_mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'convex/**'
              - 'src/application/**'
              - 'src/domain/**'
              - 'src/infrastructure/convex/**'
              - 'src/infrastructure/storage/**'
              - 'src/infrastructure/*.ts'
              - 'src/ui/shared/**'
              - '.github/workflows/report-build-status.yml'
              - 'package.json'
              - 'tsconfig.json'
              - 'biome.json'
            web:
              - 'web/**'
              - 'public/**'
              - 'src/ui/web/**'
            mobile:
              - 'mobile/**'
              - 'src/ui/mobile/**'
              - 'src/infrastructure/mobile/**'

      - name: Compute platform matrix
        id: platforms
        run: |
          run_web=false
          run_mobile=false

          if [ "${{ steps.filter.outputs.shared }}" = "true" ] || [ "${{ steps.filter.outputs.web }}" = "true" ]; then
            run_web=true
          fi

          if [ "${{ steps.filter.outputs.shared }}" = "true" ] || [ "${{ steps.filter.outputs.mobile }}" = "true" ]; then
            run_mobile=true
          fi

          echo "run_web=${run_web}" >> "$GITHUB_OUTPUT"
          echo "run_mobile=${run_mobile}" >> "$GITHUB_OUTPUT"

  web-status:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.run_web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install web dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run web tests
        run: bun run web:test

      - name: Run web build
        run: bun run web:build

  mobile-status:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.run_mobile == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install mobile dependencies
        run: cd mobile && bun install --frozen-lockfile

      - name: Run mobile checks
        run: bun run --cwd mobile test

      - name: Run mobile build check
        run: bun run --cwd mobile build:check
